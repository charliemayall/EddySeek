name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv sync --group dev
      - run: uv run ruff check .
      - run: uv run ty check
      - run: uv run python generate_docs.py
      - run: git diff --exit-code docs/USER_GUIDE.md
      - run: uv run pytest
