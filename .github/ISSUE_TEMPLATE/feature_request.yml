name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do that EddySeek does not support today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work? Config keys, G-code, UI, etc.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Area
      options:
        - Alignment / search strategy
        - Toolchanger workflow
        - Configuration
        - Moonraker / host integration
        - Documentation
        - Other
    validations:
      required: true
