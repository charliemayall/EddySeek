# Example printer.cfg snippet for EddySeek
#
# Values below are illustrative starting points, not necessarily SeekConfig defaults.
# True defaults are generated in docs/USER_GUIDE.md (Configuration reference).
# For a minimal starter see example_minimal.cfg.
#
# G-code: EDDY_SEEK_QUERY, EDDY_SEEK_RESET, EDDY_SEEK_SET, EDDY_SEEK_START,
#         EDDY_SEEK_ACCURACY, EDDY_SEEK_TOOL, EDDY_SEEK_TOOLS,
#         EDDY_SEEK_APPLY_OFFSET
#         EDDY_SEEK_TOOL REPEATS=3  - average 3 seeks per tool before saving
#
# Docs: docs/USER_GUIDE.md

[eddy_seek]
# --- LDC1612 sensor (required) ---
sensor_type: ldc1612
i2c_address: 
i2c_mcu: 
i2c_bus: 

# Optional LDC1612 tuning (same keys as Klipper's [ldc1612] section):
# frequency: 4000000
# max_sensor_hz: 80000
# reg_drive_current: 15

# --- Toolchanger (single-tool printers can leave defaults) ---
tool_count: 4
tool_prefix: es_T                    # autosave sections: es_T0, es_T1, ...
load_tool_macro_prefix: T         # load macro run as T0, T1, ...
# Bondtech INDX: see example_indx.cfg (do not copy DIY tool_count / Tn keys)
# eddy_seek will move your toolhead to Tool 0's X position, then Tool 0's Y position, after running the load macro

# Machine XY of the sensor coil. EDDY_SEEK_TOOL/EDDY_SEEK_TOOLS move tool 0
# here before seeking, then refine within max_jog of this point.
sensor_x: 150.0
sensor_y: 150.0
sensor_z: 5.0 # The height you want to run offset calibration at. 
              # Commands will error if machine Z is outside [sensor_z, sensor_z + 0.25] mm.
              # You can remove this if you don't want to enforce a specific Z height.

# --- Seek / alignment ---
max_jog_x: 5                    # max X search radius from start (mm)
max_jog_y: 5                    # max Y search radius from start (mm)
tolerance: 0.05                   # stop pass when X and Y both below this (mm)
dwell_time: 0.5                   # seconds to dwell at each probe point
jog_speed: 80                     # feedrate for travel moves (mm/s)
search_for: max                   # max or min - which frequency extreme is centre
strategy: sweep_centroid          # centroid, sweep_centroid (default), or debug_scan
max_passes: 6                     # search passes before giving up
save_session_trace: False         # write probe JSON to result_folder after each seek
save_plots: False                # write strategy HTML debug plots to result_folder (requires plotly)
result_folder: ~/printer_data/config/eddy_seek_results

# --- Sweep centroid strategy (strategy: sweep_centroid) ---
# sweep_coarse_speed: 30.0        # coarse pass feedrate (mm/s)
# sweep_fine_speed: 10.0          # fine pass feedrate (mm/s)
# sweep_overscan: 1.0              # extra travel beyond jog range (mm)
# sweep_cross_offset: 0.3          # stagger parallel sweeps (mm)
# fine_shrink: 0.6                 # fine pass range multiplier
# min_sweep_samples: 20            # minimum profile points before centroid fit
# coarse_phases: 2                  # coarse search passes before fine passes
# coarse_cross_passes: 3            # staggered sweep lines per coarse pass
# sweep_arc_resolution: 0.1          # max chord length per connector arc segment (mm)
