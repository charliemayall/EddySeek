# Example printer.cfg snippet for EddySeek
#
# Copy the [eddy_seek] section into your printer.cfg, adjust I2C and tool
# settings for your machine, then restart Klipper.
#
# G-code: EDDY_SEEK_QUERY, EDDY_SEEK_RESET, EDDY_SEEK_SET, EDDY_SEEK_START,
#         EDDY_SEEK_ACCURACY, EDDY_SEEK_TOOL, EDDY_SEEK_TOOLS,
#         EDDY_SEEK_APPLY_OFFSET
#
# Docs: docs/USER_GUIDE.md

[eddy_seek]
# --- LDC1612 sensor (required) ---
sensor_type: ldc1612
i2c_address: 42          # 0x2a
i2c_mcu: mcu
i2c_bus: i2c1

# Optional LDC1612 tuning (same keys as Klipper's [ldc1612] section):
# frequency: 4000000
# max_sensor_hz: 80000
# reg_drive_current: 15

# --- Toolchanger (single-tool printers can leave defaults) ---
tool_count: 4
tool_prefix: es_T                    # autosave sections: es_T1, es_T2, ...
load_tool_macro_prefix: T         # load macro run as T0, T1, ...

# Machine XY of the sensor coil. EDDY_SEEK_TOOL/EDDY_SEEK_TOOLS move tool 0
# here before seeking, then refine within max_jog of this point. Z is NOT
# changed - park at probe height first.
sensor_x: 150.0
sensor_y: 150.0

# --- Seek / alignment ---
max_jog_x: 5                    # max X search radius from start (mm)
max_jog_y: 5                    # max Y search radius from start (mm)
tolerance: 0.05                   # stop pass when X and Y both below this (mm)
dwell_time: 0.5                   # seconds to dwell at each probe point
jog_speed: 80                     # feedrate for travel moves (mm/s)
search_for: max                   # max or min - which frequency extreme is centre
strategy: sweep_centroid          # centroid, sweep_centroid (default), circle_harmonic, or debug_scan
max_passes: 6                     # search passes before giving up
cross_passes: 3                   # staggered axis-sweep lines on coarse passes (Must be an odd number)
save_session_trace: False         # write /tmp/seek_trace.json after each seek
save_plots: False                # write strategy HTML debug plots to result_folder (requires plotly)
result_folder: ~/printer_data/config/eddy_seek_results

# --- Sweep centroid strategy (strategy: sweep_centroid) ---
# sweep_coarse_speed: 30.0        # coarse pass feedrate (mm/s)
# sweep_fine_speed: 10.0          # fine pass feedrate (mm/s)
# sweep_overscan: 1.0              # extra travel beyond jog range (mm)
# sweep_cross_offset: 0.3          # stagger parallel sweeps (mm)
# fine_shrink: 0.4                 # fine pass range multiplier
# min_sweep_samples: 20            # minimum profile points before centroid fit

# --- Circle harmonic strategy (strategy: circle_harmonic) ---
# circle_radius_start: 2.0         # first circle-scan radius (mm)
# circle_radius_min: 0.5           # smallest circle radius (mm)
# circle_shrink: 0.4               # radius multiplier per tier step-down (after reject) next_radius = current_radius * circle_shrink
# circle_arc_resolution: 0.1       # max chord length per circle segment (mm)
# circle_speed: 10.0              # circle scan feedrate (mm/s)
# noise_k: 1.0                    # converge when amp < noise_k * fit noise
# harmonic_step_gain: 0.15         # mm per unit amp when radial slope unusable
# harmonic_min_quality: 0.5        # min variance explained by 1st harmonic
# circle_skip_bootstrap: False     # skip sweep bootstrap; use session start (sensor_x/y) as center
# circle_bootstrap_slope_only: False  # sweep for f_prime only; circles find center from session start
